name: ENAU · Notificação Telegram

on:
  schedule:
    # Horário de Brasília = UTC-3
    # 06:00 BRT = 09:00 UTC
    - cron: '0 9 * * 1-5'
    # 11:00 BRT = 14:00 UTC
    - cron: '0 14 * * 1-5'
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Enviar notificação Telegram
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python notify_telegram.py
